name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Java 环境 (Android 构建必需)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置 Flutter SDK (关键修改点)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 强制指定一个较新的版本号，以匹配 sylvakru 要求的 Dart 3.11+
          # 如果 stable 频道还没更新到对应版本，可以尝试 'beta' 或 'master'
          flutter-version: '3.29.0' 

      # 4. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 5. 编译 APK
      - name: Build APK
        run: flutter build apk --release

      # 6. 上传产物 (使用 v4 版本避免报错)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
