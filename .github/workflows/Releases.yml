name: Release APK

# ✅ 改成"网页点按钮"触发；不再依赖手动打 tag
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不要带 v），例如 3.4.6.1'
        required: false
        default: '3.4.6.1'

permissions:
  contents: write          # ⚠️ 别删，删了建 tag / 发 Release 会 403

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ⚠️ 拉全历史，下面算 build 号才准

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'
          cache: true

      # —— 签名两步，照搬，别动 ——
      - name: Generate temporary release keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/release-keystore.jks" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"

      - name: Create key.properties for CI
        run: |
          {
            echo "storePassword=android123"
            echo "keyPassword=android123"
            echo "keyAlias=release"
            echo "storeFile=$GITHUB_WORKSPACE/release-keystore.jks"
          } > "$GITHUB_WORKSPACE/android/key.properties"

      # ✅ 版本号在这里定：显示版本=你填的；内部 build 号=commit 总数（自动、递增）
      - name: Compute version
        run: |
          VER="${{ inputs.version }}"
          BUILD=$(git rev-list --count HEAD)
          echo "VER=$VER"   >> "$GITHUB_ENV"
          echo "BUILD=$BUILD" >> "$GITHUB_ENV"
          echo ">>> 将发布 v$VER （内部 build number = $BUILD）"

      - name: Install dependencies
        run: flutter pub get

      # ✅ 用 --build-name / --build-number 覆盖 pubspec，无需改 pubspec.yaml
      - name: Build APK (split per ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --build-name="$VER" --build-number="$BUILD"

      - name: Prepare 32-bit & 64-bit APKs
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             release/sylvakru-${VER}-arm32.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             release/sylvakru-${VER}-arm64.apk
          ls -lh release/

      # ✅ tag 不存在时，这个插件会自动创建 tag = v<版本号>
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VER }}
          name: Sylvakru ${{ env.VER }}
          generate_release_notes: true
          body: |
            显示版本：**${{ env.VER }}**　内部 build：${{ env.BUILD }}
            ## 下载哪个？/ Which one to download?
            - **arm64**（64 位）：近几年的绝大多数手机，**推荐**。
            - **arm32**（32 位）：仅较老的 32 位设备需要。
            - 不确定就选 **arm64**。
          files: release/*.apk
